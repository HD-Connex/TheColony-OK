# Mux + Supabase integration config
# Generated by: npx @mux/supabase init (manual equivalent)
# Docs: https://github.com/mux/mux-supabase

[mux]
# Webhook secret used to verify incoming Mux webhook signatures
webhook_secret = "MUX_WEBHOOK_SECRET"

# The Supabase schema where Mux data lives
schema = "mux"

# ── Workflows ──
# Define workflows that trigger Edge Functions on specific Mux events.
# The function receives the full webhook payload as POST body.

[[workflows]]
event = "video.asset.ready"
function = "mux-webhook"
description = "On asset ready: upsert mux.assets, auto-create program entry, set thumbnail"

[[workflows]]
event = "video.live_stream.active"
function = "mux-webhook"
description = "On live stream active: upsert mux.live_streams"

[[workflows]]
event = "video.live_stream.idle"
function = "mux-webhook"
description = "On live stream idle: upsert mux.live_streams"

[[workflows]]
event = "video.live_stream.ended"
function = "mux-webhook"
description = "On live stream ended: upsert mux.live_streams, mark recording"

[[workflows]]
event = "video.upload.asset_created"
function = "mux-webhook"
description = "On upload → asset: link upload to asset in mux.uploads"

# ── Backfill ──
# One-time: import existing Mux assets into Supabase
# Run: supabase functions deploy mux-webhook
# Then: npx @mux/supabase backfill

[backfill]
enabled = true
batch_size = 50
