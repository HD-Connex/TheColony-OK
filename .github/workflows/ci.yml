name: CI

on:
  push:
    branches:
      - main
      - latest-for-testing
  pull_request:
    branches:
      - main
      - latest-for-testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit --skipLibCheck
  # Phase 3 CI notes complete: build + lint + type on PR/push to protected branches.
  # Extend later for e2e, migration checks, Sentry release per vercel-cicd.