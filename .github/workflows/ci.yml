name: CI

on:
  push:
    branches:
      - main
      - latest-for-testing
  pull_request:
    branches:
      - main
      - latest-for-testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit --skipLibCheck

      - name: Test (vitest)
        run: npm test

      - name: Build
        run: npm run build
  # Phase 3-06 CI: npm ci + lint + tsc --noEmit + vitest + build on push/PR to main/latest-for-testing.
  # Tests cover sanitize, rate-limit, safeCompare, entitlements (pure + memory paths).
  # Add e2e + migration lint + Sentry release tokens later per vercel-cicd guidance.