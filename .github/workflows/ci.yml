name: CI

on:
  push:
    branches:
      - main
      - latest-for-testing
  pull_request:
    branches:
      - main
      - latest-for-testing

# Least privilege: CI only needs to read the repo to install, lint, test, and build.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      # Pin npm to a v9.x release to match the lockfile generator
      - name: Pin npm to v9 (temporary, matches lockfile)
        run: npm i -g npm@9

      - name: Diagnostics
        run: |
          node --version
          npm --version
          echo "Lockfile head:"
          head -n 5 package-lock.json || true
          # show lockfile version if jq available
          if command -v jq >/dev/null 2>&1; then jq -r '.lockfileVersion' package-lock.json || true; fi

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit --skipLibCheck

      - name: Test (vitest)
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npx playwright test
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Migration order lint
        run: |
          echo "Checking supabase/migrations sort order (lexical + version):"
          ls supabase/migrations | sort -V
